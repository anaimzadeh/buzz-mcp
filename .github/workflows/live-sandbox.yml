name: Live Buzz Sandbox

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  live-buzz:
    name: Live Buzz sandbox
    runs-on: ubuntu-latest
    environment: buzz-sandbox
    env:
      BUZZ_RUN_LIVE_TESTS: "1"
      BUZZ_USERNAME: ${{ secrets.BUZZ_USERNAME }}
      BUZZ_PASSWORD: ${{ secrets.BUZZ_PASSWORD }}
      BUZZ_DOMAIN: ${{ secrets.BUZZ_DOMAIN }}
      BUZZ_BASE_URL: ${{ secrets.BUZZ_BASE_URL }}
      BUZZ_TEST_ENTITYID: ${{ secrets.BUZZ_TEST_ENTITYID }}
      BUZZ_TEST_ITEMID: ${{ secrets.BUZZ_TEST_ITEMID }}
      BUZZ_TEST_ENROLLMENTID: ${{ secrets.BUZZ_TEST_ENROLLMENTID }}
      BUZZ_TEST_DOMAINID: ${{ secrets.BUZZ_TEST_DOMAINID }}
      BUZZ_TEST_ATTACHMENT_FILEPATH: ${{ secrets.BUZZ_TEST_ATTACHMENT_FILEPATH }}
      BUZZ_TEST_USERID: ${{ secrets.BUZZ_TEST_USERID }}
      BUZZ_TEST_SANDBOX_ACK: ${{ vars.BUZZ_TEST_SANDBOX_ACK }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Validate live sandbox configuration
        run: python scripts/check_live_buzz_env.py

      - name: Run live Buzz sandbox tests
        run: env PYTHONPATH=src uv run python -m unittest tests.test_live_buzz
